<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Cards</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f0f4ff;
        --surface: #ffffff;
        --primary: #4f6ef7;
        --primary-light: #eef0ff;
        --primary-dark: #3a57d4;
        --accent: #ff6b6b;
        --text: #1a1d2e;
        --text-sub: #6b7280;
        --border: #e5e7eb;
        --shadow: 0 4px 20px rgba(79, 110, 247, 0.1);
        --radius: 16px;
      }

      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 20px 32px;
        display: flex;
        align-items: center;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      }
      header .logo {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--primary);
        letter-spacing: -0.5px;
      }
      header .logo span {
        color: var(--accent);
      }

      /* ── Main layout ── */
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 24px;
      }

      /* ── Controls ── */
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
        margin-bottom: 28px;
      }

      .search-wrap {
        flex: 1;
        min-width: 240px;
        position: relative;
      }
      .search-wrap svg {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-sub);
        pointer-events: none;
      }
      #searchInput {
        width: 100%;
        padding: 13px 16px 13px 46px;
        border: 2px solid var(--border);
        border-radius: 12px;
        font-size: 0.95rem;
        background: var(--surface);
        color: var(--text);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      #searchInput:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.12);
      }
      #searchInput::placeholder {
        color: var(--text-sub);
      }

      .sort-group {
        display: flex;
        gap: 8px;
        background: var(--surface);
        border: 2px solid var(--border);
        border-radius: 12px;
        padding: 4px;
      }
      .sort-btn {
        padding: 8px 18px;
        border: none;
        border-radius: 9px;
        cursor: pointer;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-sub);
        background: transparent;
        transition: all 0.18s;
      }
      .sort-btn.active {
        background: var(--primary);
        color: #fff;
        box-shadow: 0 2px 8px rgba(79, 110, 247, 0.3);
      }
      .sort-btn:not(.active):hover {
        background: var(--primary-light);
        color: var(--primary);
      }

      /* ── Stats ── */
      .stats {
        font-size: 0.85rem;
        color: var(--text-sub);
        margin-bottom: 20px;
      }
      .stats strong {
        color: var(--primary);
        font-weight: 700;
      }

      /* ── Card Grid ── */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 20px;
      }

      .word-card {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 24px 22px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        cursor: pointer;
        transition:
          transform 0.18s,
          box-shadow 0.18s;
        position: relative;
        overflow: hidden;
      }
      .word-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: var(--primary);
        border-radius: 4px 0 0 4px;
        opacity: 0;
        transition: opacity 0.18s;
      }
      .word-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 32px rgba(79, 110, 247, 0.15);
      }
      .word-card:hover::before {
        opacity: 1;
      }

      .card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .word-en {
        font-size: 1.35rem;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.3px;
        line-height: 1.2;
      }
      .word-pos {
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 3px 9px;
        border-radius: 999px;
        background: var(--primary-light);
        color: var(--primary);
        white-space: nowrap;
        margin-left: 8px;
      }
      .word-phonetic {
        font-size: 0.83rem;
        color: var(--text-sub);
        margin-bottom: 10px;
        font-style: italic;
      }
      .word-ko {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 10px;
      }
      .word-example {
        font-size: 0.82rem;
        color: var(--text-sub);
        line-height: 1.55;
        border-top: 1px dashed var(--border);
        padding-top: 10px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .word-date {
        font-size: 0.72rem;
        color: #c0c5d0;
        margin-top: 10px;
        text-align: right;
      }

      /* highlight matched text */
      mark {
        background: rgba(255, 213, 79, 0.55);
        color: inherit;
        border-radius: 3px;
        padding: 0 1px;
      }

      /* ── Empty state ── */
      .empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 80px 20px;
        color: var(--text-sub);
      }
      .empty svg {
        margin-bottom: 16px;
        opacity: 0.35;
      }
      .empty p {
        font-size: 1rem;
      }

      /* ── Add button ── */
      .fab {
        position: fixed;
        bottom: 36px;
        right: 36px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: var(--primary);
        color: #fff;
        border: none;
        cursor: pointer;
        font-size: 1.6rem;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 24px rgba(79, 110, 247, 0.4);
        transition:
          background 0.18s,
          transform 0.18s;
        z-index: 200;
      }
      .fab:hover {
        background: var(--primary-dark);
        transform: scale(1.08);
      }

      /* ── Modal ── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(4px);
        z-index: 300;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: var(--surface);
        border-radius: 20px;
        padding: 32px 28px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
        animation: popIn 0.22s ease;
      }
      @keyframes popIn {
        from {
          transform: scale(0.93);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .modal h2 {
        font-size: 1.2rem;
        font-weight: 800;
        margin-bottom: 22px;
        color: var(--text);
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text-sub);
        margin-bottom: 6px;
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 11px 14px;
        border: 2px solid var(--border);
        border-radius: 10px;
        font-size: 0.93rem;
        color: var(--text);
        outline: none;
        background: var(--bg);
        transition: border-color 0.18s;
        font-family: inherit;
      }
      .form-group textarea {
        resize: vertical;
        min-height: 72px;
      }
      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        border-color: var(--primary);
      }
      .form-row {
        display: flex;
        gap: 12px;
      }
      .form-row .form-group {
        flex: 1;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 24px;
      }
      .btn-cancel {
        padding: 10px 22px;
        border-radius: 10px;
        border: 2px solid var(--border);
        background: transparent;
        color: var(--text-sub);
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-cancel:hover {
        background: var(--border);
      }
      .btn-add {
        padding: 10px 24px;
        border-radius: 10px;
        border: none;
        background: var(--primary);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 3px 12px rgba(79, 110, 247, 0.3);
        transition: background 0.15s;
      }
      .btn-add:hover {
        background: var(--primary-dark);
      }

      @media (max-width: 600px) {
        header {
          padding: 16px 18px;
        }
        main {
          padding: 20px 14px;
        }
        .controls {
          gap: 10px;
        }
        .fab {
          bottom: 22px;
          right: 22px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">Word<span>Cards</span></div>
    </header>

    <main>
      <div class="controls">
        <div class="search-wrap">
          <svg
            width="18"
            height="18"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            viewBox="0 0 24 24"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input
            id="searchInput"
            type="text"
            placeholder="단어, 뜻, 예문 검색..."
            autocomplete="off"
          />
        </div>
        <div class="sort-group">
          <button class="sort-btn active" data-sort="newest">최신순</button>
          <button class="sort-btn" data-sort="alpha">알파벳순</button>
        </div>
      </div>

      <div class="stats" id="stats"></div>
      <div class="card-grid" id="cardGrid"></div>
    </main>

    <button class="fab" id="fabBtn" title="단어 추가">＋</button>

    <!-- Add Word Modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h2>새 단어 추가</h2>
        <div class="form-row">
          <div class="form-group">
            <label>영어 단어 *</label>
            <input id="fWord" type="text" placeholder="e.g. serendipity" />
          </div>
          <div class="form-group">
            <label>품사</label>
            <select id="fPos">
              <option value="noun">명사</option>
              <option value="verb">동사</option>
              <option value="adj">형용사</option>
              <option value="adv">부사</option>
              <option value="etc">기타</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>발음기호</label>
          <input
            id="fPhonetic"
            type="text"
            placeholder="e.g. /ˌserənˈdɪpɪti/"
          />
        </div>
        <div class="form-group">
          <label>한국어 뜻 *</label>
          <input id="fKo" type="text" placeholder="e.g. 뜻밖의 행운" />
        </div>
        <div class="form-group">
          <label>예문</label>
          <textarea
            id="fExample"
            placeholder="e.g. It was pure serendipity that we met."
          ></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" id="cancelBtn">취소</button>
          <button class="btn-add" id="addBtn">추가하기</button>
        </div>
      </div>
    </div>

    <script>
      /* ── 샘플 데이터 ── */
      const SAMPLE = [
        {
          id: 1,
          word: "serendipity",
          pos: "noun",
          phonetic: "/ˌserənˈdɪpɪti/",
          ko: "뜻밖의 행운",
          example: "Finding that old photo was pure serendipity.",
          date: new Date("2026-03-20"),
        },
        {
          id: 2,
          word: "ephemeral",
          pos: "adj",
          phonetic: "/ɪˈfemərəl/",
          ko: "덧없는, 단명하는",
          example:
            "The ephemeral beauty of cherry blossoms makes them more precious.",
          date: new Date("2026-03-21"),
        },
        {
          id: 3,
          word: "resilience",
          pos: "noun",
          phonetic: "/rɪˈzɪliəns/",
          ko: "회복력, 탄력성",
          example: "Her resilience in the face of adversity was remarkable.",
          date: new Date("2026-03-22"),
        },
        {
          id: 4,
          word: "scrutinize",
          pos: "verb",
          phonetic: "/ˈskruːtənaɪz/",
          ko: "면밀히 살펴보다",
          example: "The auditors will scrutinize every expense.",
          date: new Date("2026-03-24"),
        },
      ];

      let words = [...SAMPLE];
      let nextId = words.length + 1;
      let currentSort = "newest";
      let searchQuery = "";

      /* ── POS label map ── */
      const posLabel = {
        noun: "n.",
        verb: "v.",
        adj: "adj.",
        adv: "adv.",
        etc: "etc.",
      };

      /* ── Highlight helper ── */
      function highlight(text, query) {
        if (!query) return text;
        const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        return text.replace(
          new RegExp(`(${escaped})`, "gi"),
          "<mark>$1</mark>",
        );
      }

      /* ── Filter & Sort ── */
      function getFiltered() {
        const q = searchQuery.trim().toLowerCase();
        let list = words.filter(
          (w) =>
            !q ||
            w.word.toLowerCase().includes(q) ||
            w.ko.includes(q) ||
            (w.example && w.example.toLowerCase().includes(q)) ||
            (w.phonetic && w.phonetic.toLowerCase().includes(q)),
        );
        if (currentSort === "newest") list.sort((a, b) => b.date - a.date);
        else list.sort((a, b) => a.word.localeCompare(b.word));
        return list;
      }

      /* ── Render ── */
      function render() {
        const q = searchQuery.trim();
        const list = getFiltered();
        const grid = document.getElementById("cardGrid");
        const stats = document.getElementById("stats");

        stats.innerHTML = q
          ? `"<strong>${q}</strong>" 검색 결과 <strong>${list.length}</strong>개 / 전체 ${words.length}개`
          : `전체 <strong>${list.length}</strong>개 단어`;

        if (list.length === 0) {
          grid.innerHTML = `
        <div class="empty">
          <svg width="64" height="64" fill="none" stroke="#6b7280" stroke-width="1.5" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <p>검색 결과가 없습니다.</p>
        </div>`;
          return;
        }

        grid.innerHTML = list
          .map(
            (w) => `
      <div class="word-card">
        <div class="card-header">
          <div class="word-en">${highlight(w.word, q)}</div>
          <span class="word-pos">${posLabel[w.pos] || w.pos}</span>
        </div>
        ${w.phonetic ? `<div class="word-phonetic">${highlight(w.phonetic, q)}</div>` : ""}
        <div class="word-ko">${highlight(w.ko, q)}</div>
        ${w.example ? `<div class="word-example">${highlight(w.example, q)}</div>` : ""}
        <div class="word-date">${w.date.toLocaleDateString("ko-KR")}</div>
      </div>
    `,
          )
          .join("");
      }

      /* ── Search ── */
      document.getElementById("searchInput").addEventListener("input", (e) => {
        searchQuery = e.target.value;
        render();
      });

      /* ── Sort ── */
      document.querySelectorAll(".sort-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".sort-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentSort = btn.dataset.sort;
          render();
        });
      });

      /* ── Modal ── */
      const overlay = document.getElementById("modalOverlay");
      document
        .getElementById("fabBtn")
        .addEventListener("click", () => overlay.classList.add("open"));
      document
        .getElementById("cancelBtn")
        .addEventListener("click", () => closeModal());
      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) closeModal();
      });

      function closeModal() {
        overlay.classList.remove("open");
        ["fWord", "fPhonetic", "fKo", "fExample"].forEach(
          (id) => (document.getElementById(id).value = ""),
        );
        document.getElementById("fPos").value = "noun";
      }

      document.getElementById("addBtn").addEventListener("click", () => {
        const word = document.getElementById("fWord").value.trim();
        const ko = document.getElementById("fKo").value.trim();
        if (!word || !ko) {
          alert("영어 단어와 한국어 뜻은 필수입니다.");
          return;
        }

        words.unshift({
          id: nextId++,
          word,
          pos: document.getElementById("fPos").value,
          phonetic: document.getElementById("fPhonetic").value.trim(),
          ko,
          example: document.getElementById("fExample").value.trim(),
          date: new Date(),
        });
        closeModal();
        render();
      });

      /* ── Init ── */
      render();
    </script>
  </body>
</html>
