<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테일윈드로 flexbox 반응형 웹 만들기</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <!--
      Mobile  (< 768px)  : 기본 스타일
      Tablet  (768~1023px): md: 접두사
      PC      (>= 1024px) : lg: 접두사
    -->
    <div class="flex flex-wrap text-[32px] font-bold">

      <!-- 헤더: mobile=100%, tablet=80% order-0, pc=100% -->
      <div class="flex grow justify-center items-center
                  basis-full h-[100px] bg-[lightgreen]
                  md:basis-[80%] md:order-[0]
                  lg:basis-full lg:order-none">
        <p>헤더</p>
      </div>

      <!-- 섹션1: mobile=50% 200px, tablet=100% 100px order-2, pc=50% 200px -->
      <div class="flex grow justify-center items-center
                  basis-1/2 h-[200px] bg-[#ffb3b3]
                  md:basis-full md:h-[100px] md:order-[2]
                  lg:basis-1/2 lg:h-[200px] lg:order-none">
        <p>섹션1</p>
      </div>

      <!-- 섹션2: mobile=50% 200px, tablet=100% 100px order-3, pc=50% 200px -->
      <div class="flex grow justify-center items-center
                  basis-1/2 h-[200px] bg-[#ffdcdc]
                  md:basis-full md:h-[100px] md:order-[3]
                  lg:basis-1/2 lg:h-[200px] lg:order-none">
        <p>섹션2</p>
      </div>

      <!-- 섹션3: mobile=50% 200px, tablet=100% 100px order-4, pc=50% 200px -->
      <div class="flex grow justify-center items-center
                  basis-1/2 h-[200px] bg-[#85e4eb]
                  md:basis-full md:h-[100px] md:order-[4]
                  lg:basis-1/2 lg:h-[200px] lg:order-none">
        <p>섹션3</p>
      </div>

      <!-- 섹션4: mobile=50% 200px, tablet=100% 100px order-5, pc=50% 200px -->
      <div class="flex grow justify-center items-center
                  basis-1/2 h-[200px] bg-[#b1e8ec]
                  md:basis-full md:h-[100px] md:order-[5]
                  lg:basis-1/2 lg:h-[200px] lg:order-none">
        <p>섹션4</p>
      </div>

      <!-- 광고: mobile=30%, tablet=20% order-1, pc=50% -->
      <div class="flex grow justify-center items-center
                  basis-[30%] h-[100px] bg-[#ecb3ff]
                  md:basis-[20%] md:order-[1]
                  lg:basis-1/2 lg:order-none">
        <p>광고</p>
      </div>

      <!-- 정보: mobile=70%, tablet=30% order-6, pc=50% -->
      <div class="flex grow justify-center items-center
                  basis-[70%] h-[100px] bg-[#497c8d]
                  md:basis-[30%] md:order-[6]
                  lg:basis-1/2 lg:order-none">
        <p>정보</p>
      </div>

      <!-- 푸터: mobile=100%, tablet=70% order-7, pc=100% -->
      <div class="flex grow justify-center items-center
                  basis-full h-[100px] bg-[#b3ffd9]
                  md:basis-[70%] md:order-[7]
                  lg:basis-full lg:order-none">
        <p>푸터</p>
      </div>

    </div>
  </body>
</html>
