<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테일윈드CSS로 시맨틱태그 구성하기</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen flex flex-col">
    <!-- 헤더 : 상단 전체 너비 -->
    <header
      class="bg-purple-600 text-white text-center py-5 text-xl font-semibold border border-black"
    >
      Header
    </header>

    <!-- 내비게이션 : 헤더 아래 전체 너비 -->
    <nav
      class="bg-green-800 text-white text-center py-3 text-lg font-medium border border-black"
    >
      Nav
    </nav>

    <!-- 메인 콘텐츠 영역 : Section + Aside 나란히 -->
    <main class="flex flex-1">
      <!-- 본문 : 좌측 2/3 차지 -->
      <section
        class="bg-teal-500 text-white flex items-center justify-center text-xl font-medium w-2/3 min-h-48 border border-black"
      >
        Section
      </section>

      <!-- 사이드바 : 우측 1/3 차지 -->
      <aside
        class="bg-amber-400 text-white flex items-center justify-center text-xl font-medium w-1/3 border border-black"
      >
        Aside
      </aside>
    </main>

    <!-- 푸터 : 하단 전체 너비 -->
    <footer
      class="bg-olive-700 text-white text-center py-4 text-lg font-medium border border-black"
      style="background-color: #6b7a2a"
    >
      Footer
    </footer>
  </body>
</html>
