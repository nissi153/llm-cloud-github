<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>메모 목록</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        a { color: #2563eb; text-decoration: none; }
        .btn { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-primary { background: #2563eb; color: white; padding: 8px 16px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>메모 목록 (Supabase)</h1>
    <a class="btn btn-primary" href="/memo/new">새 메모 작성</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>제목</th>
                <th>내용</th>
                <th>작성일</th>
                <th>삭제</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="memo : ${memos}">
                <td th:text="${memo.id}"></td>
                <td th:text="${memo.title}"></td>
                <td th:text="${memo.content}"></td>
                <td th:text="${#temporals.format(memo.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td>
                    <form th:action="@{/memo/{id}/delete(id=${memo.id})}" method="post">
                        <button class="btn btn-danger" type="submit">삭제</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <p th:if="${#lists.isEmpty(memos)}">등록된 메모가 없습니다.</p>
</body>
</html>
