<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>메모 작성</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        textarea { height: 120px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-top: 20px; }
        .btn-primary { background: #2563eb; color: white; }
        a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
    <h1>메모 작성</h1>

    <form action="/memo" method="post" th:object="${memo}">
        <label>제목</label>
        <input type="text" th:field="*{title}" required>

        <label>내용</label>
        <textarea th:field="*{content}" required></textarea>

        <button class="btn btn-primary" type="submit">저장</button>
        <a href="/memo" style="margin-left: 10px;">취소</a>
    </form>
</body>
</html>
