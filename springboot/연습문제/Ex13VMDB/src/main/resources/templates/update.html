<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>자판기 프로그램</title>
</head>
<body>
<div id="wrap">
    <h2>자판기 상품 수정</h2>
    <form action="/updateAction" method="post">
        <input type="hidden" name="productNo" th:value="${ product.productNo }">
        <div>상품명:</div>
        <div><input type="text" name="productName"
                    th:value="${ product.productName }" /></div>
        <div>가격:</div>
        <div><input type="text" name="productPrice"
                    th:value="${ product.productPrice }" /></div>
        <div>유통기한:</div>
        <div><input type="text" name="productLimitDate"
                    th:value="${ product.productLimitDate }" /></div>
        <div>
            <button type="submit">상품 수정하기</button>
            &nbsp;  &nbsp;
            <button type="button" onclick=" location.href='/list' ">돌아가기</button>
        </div>
    </form>
</div>
</body>
</html>
