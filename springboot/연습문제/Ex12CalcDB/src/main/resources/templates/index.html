<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>계산기</title>
  <style>
    #wrap {
      border: 1px solid black;
      padding: 0;
      /* 가로중앙 정렬 */
      margin: 0 auto;
      width: 300px;
      height: 500px;
      /* flexbox : Flexable Grid 사용 - 컨테이너에 적용 */
      display: flex;
      /* 콘텐츠가 넘치면 줄바꿈한다. */
      flex-wrap: wrap;
      /* 주축방향 세로로 */
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    #res {
      display: flex;
    }
    #num1,
    #num2 {
      background-color: rgb(216, 213, 213);
      margin-bottom: 18px;
      margin-left: 20px;
      width: 150px;
      height: 25px;
      text-align: center;
      border: 1px solid rgb(112, 112, 112);
    }
    #result {
      background-color: rgb(112, 112, 112);
      color: white;
      margin-bottom: 18px;
      margin-left: 5px;
      width: 150px;
      height: 25px;
      text-align: center;
      border: 1px solid rgb(112, 112, 112);
    }
    #add,
    #mul,
    #sub,
    #div {
      width: 220px;
      height: 30px;
      background-color: rgb(40, 108, 209);
      /* 검은색 테두리 제거 */
      border: 0px;
      color: white;
      margin-bottom: 5px;
    }
    #del {
      width: 220px;
      height: 30px;
      background-color: rgb(241, 50, 50);
      border: 0px;
      color: white;
    }
    #btn-group {
      display: flex;
      flex-flow: column wrap;
      justify-items: center;
      gap: 15px;
    }
  </style>
  <script>
    //onload 이벤트 핸들러(콜백함수) : html 로딩 완료후 한번 호출해줌.
    window.onload = function () {
        //object
        var num1 = document.getElementById("num1");
        var num2 = document.getElementById("num2");
        var result = document.getElementById("result");
        var add = document.getElementById("add");
        var sub = document.getElementById("sub");
        var mul = document.getElementById("mul");
        var div = document.getElementById("div");
        var del = document.getElementById("del");
        add.onclick = function () {
          let calType = document.getElementById("calType");
          calType.value = "add";

          submit_form();
        };
        del.onclick = function () {
          result.value = "";
        };
      };
      function submit_form() {
        let form = document.formCalc;
        form.action = "/calc-submit";
        form.method = "get";
        form.submit();
      }
  </script>
</head>
<body>
<div id="wrap">
  <div>
    <p>계산기</p>
  </div>
  <!--  get요청 : 주소줄에 파라미터가 달려서 들어간다. -->
  <!--  post, put, delete : body에 데이터가 들어간다. -->
  <form name="formCalc" action="/calc" method="get">
    <div>
      <label>숫자 1</label>
      <input type="text" id="num1" name="num1" th:value=" ${ num1 } " /><br />
    </div>
    <div>
      <label>숫자 2</label>
      <input type="text" id="num2" name="num2" th:value="${ num2 }" /><br />
    </div>
   <!--  사용자에게는 안보이고, 서버에는 데이터가 전달 되는 곳에 사용.   -->
    <input type="hidden" id="calType" name="calType" value="" />
    <div id="res">
      <label>연산 결과</label>
      <input type="text" disabled="disbled" id="result" th:value="${ result } " />
    </div>
    <br />
    <div id="btn-group">
      <button type="button" id="add">덧셈</button>
      <button type="button" id="sub">뺄셈</button>
      <button type="button" id="mul">곱셈</button>
      <button type="button" id="div">나눗셈</button>
      <button type="button" id="del">지우기</button>
    </div>
  </form>
</div>
</body>
</html>
