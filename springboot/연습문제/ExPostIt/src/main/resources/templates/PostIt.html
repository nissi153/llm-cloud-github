<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link type="text/css" src="/index.css" />
    <title>Post-it</title>
    <style>
      /* ===== PostItBoard.css ===== */
      .postit-wrapper {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #f0ede6;
      }

      /* 헤더 */
      .postit-header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 24px;
        height: 60px;
        background: #2c2c2c;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        flex-shrink: 0;
        z-index: 100;
      }

      .postit-logo {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
      }

      .postit-logoIcon {
        font-size: 22px;
      }

      .postit-logoText {
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.5px;
      }

      .postit-info {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        min-width: 60px;
        text-align: right;
      }

      .postit-addBtn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 18px;
        background: #ffd600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 700;
        color: #2c2c2c;
        transition:
          background 0.15s,
          transform 0.1s;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
      }

      .postit-addBtn:hover {
        background: #ffe033;
        transform: translateY(-1px);
      }

      .postit-addBtn:active {
        transform: translateY(0);
      }

      .postit-addBtnIcon {
        font-size: 20px;
        line-height: 1;
        margin-top: -1px;
      }

      .postit-addBtnLabel {
        font-size: 14px;
      }

      /* 보드 */
      .postit-board {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      /* 도트 격자 배경 */
      .postit-gridBg {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          circle,
          rgba(0, 0, 0, 0.12) 1px,
          transparent 1px
        );
        background-size: 28px 28px;
        pointer-events: none;
      }

      /* 빈 상태 */
      .postit-empty {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        pointer-events: none;
        color: rgba(0, 0, 0, 0.3);
        font-size: 15px;
      }

      .postit-empty p:first-child {
        font-size: 52px;
        margin-bottom: 8px;
      }

      .postit-empty strong {
        color: rgba(0, 0, 0, 0.5);
      }

      /* ===== PostItNote.css ===== */
      .postit-note {
        position: absolute;
        width: 200px;
        min-height: 200px;
        display: flex;
        flex-direction: column;
        border-radius: 4px;
        box-shadow:
          4px 4px 12px rgba(0, 0, 0, 0.2),
          1px 1px 4px rgba(0, 0, 0, 0.1);
        transition:
          box-shadow 0.15s ease,
          transform 0.15s ease;
        cursor: grab;
        user-select: none;
      }

      .postit-note:hover {
        box-shadow:
          6px 6px 20px rgba(0, 0, 0, 0.28),
          2px 2px 6px rgba(0, 0, 0, 0.12);
      }

      .postit-note.isDragging {
        cursor: grabbing;
        box-shadow:
          12px 16px 32px rgba(0, 0, 0, 0.35),
          3px 3px 8px rgba(0, 0, 0, 0.15);
        transform: scale(1.04) rotate(0deg) !important;
      }

      .postit-noteHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px 4px 10px;
        cursor: grab;
      }

      .postit-note.isDragging .postit-noteHeader {
        cursor: grabbing;
      }

      .postit-noteLines {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .postit-noteLines span {
        display: block;
        width: 18px;
        height: 2px;
        background: rgba(0, 0, 0, 0.25);
        border-radius: 2px;
      }

      .postit-deleteBtn {
        background: none;
        border: none;
        cursor: pointer;
        color: rgba(0, 0, 0, 0.35);
        font-size: 13px;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition:
          background 0.15s,
          color 0.15s;
        padding: 0;
      }

      .postit-deleteBtn:hover {
        background: rgba(0, 0, 0, 0.12);
        color: rgba(0, 0, 0, 0.7);
      }

      .postit-textarea {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        resize: none;
        padding: 4px 12px 12px 12px;
        font-family: "Nanum Pen Script", "Noto Sans KR", cursive, sans-serif;
        font-size: 15px;
        line-height: 1.6;
        color: rgba(0, 0, 0, 0.75);
        cursor: text;
        min-height: 140px;
      }

      .postit-textarea::placeholder {
        color: rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body style="margin: 0">
    <div class="postit-wrapper">
      <header class="postit-header">
        <div class="postit-logo">
          <span class="postit-logoIcon" aria-hidden="true">📝</span>
          <span class="postit-logoText">Post-it</span>
        </div>
        <div class="postit-info" id="postitInfo">메모 0개</div>
        <button
          class="postit-addBtn"
          id="postitAddBtn"
          type="button"
          title="메모 추가"
        >
          <span class="postit-addBtnIcon" aria-hidden="true">+</span>
          <span class="postit-addBtnLabel">새 메모</span>
        </button>
      </header>

      <div class="postit-board" id="postitBoard">
        <div class="postit-gridBg" aria-hidden="true"></div>

        <div class="postit-empty" id="postitEmpty" hidden>
          <p>📋</p>
          <p>메모가 없습니다</p>
          <p>상단의 <strong>+ 새 메모</strong> 버튼을 눌러보세요!</p>
        </div>
      </div>
    </div>

    <script>
      const NOTE_COLORS = [
        "#FFF176",
        "#F8BBD0",
        "#B3E5FC",
        "#C8E6C9",
        "#FFE0B2",
        "#E1BEE7",
      ];
      const state = { notes: [], zOrder: [], colorIndex: 3, drag: null };

      const els = {
        board: document.getElementById("postitBoard"),
        info: document.getElementById("postitInfo"),
        addBtn: document.getElementById("postitAddBtn"),
        empty: document.getElementById("postitEmpty"),
      };

      function generateId() {
        return Math.random().toString(36).slice(2, 9);
      }

      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, v));
      }

      function bringToFront(id) {
        state.zOrder = [...state.zOrder.filter((z) => z !== id), id];
      }

      async function deleteNote(id) {
        try {
          const apiUrl = new URL("/api/delete", window.location.origin);
          apiUrl.searchParams.set("id", String(id));

          const res = await fetch(apiUrl.toString(), {
            method: "GET",
            headers: { Accept: "application/json" },
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          state.notes = state.notes.filter((n) => n.id !== id);
          state.zOrder = state.zOrder.filter((z) => z !== id);
          render();
        } catch (e) {
          console.error("노트 삭제 실패:", e);
          alert("노트 삭제에 실패했습니다.");
        }
      }

      async function updateNote(id) {
        const n = state.notes.find((x) => x.id === id);
        if (!n) return;

        try {
          const apiUrl = new URL(
            "/api/update",
            window.location.origin,
          ).toString();
          const body = new URLSearchParams({
            id: String(id),
            x: String(Math.round(n.x ?? 0)),
            y: String(Math.round(n.y ?? 0)),
            content: String(n.content ?? ""),
          });

          const res = await fetch(apiUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
            },
            body,
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json().catch(() => null);
          if (data && data.id != null) {
            const nn = state.notes.find((x) => x.id === String(data.id));
            if (nn) {
              if (data.x != null) nn.x = Number(data.x);
              if (data.y != null) nn.y = Number(data.y);
              if (data.content != null) nn.content = String(data.content);
            }
          }
        } catch (e) {
          console.error("노트 업데이트 실패:", e);
          alert("노트 업데이트에 실패했습니다.");
        }
      }

      async function addNote() {
        const rect = els.board.getBoundingClientRect();
        const bw = rect.width || 800;
        const bh = rect.height || 600;

        const x = Math.floor(Math.random() * (bw - 240) + 40);
        const y = Math.floor(Math.random() * (bh - 260) + 60);
        const rotation = parseFloat(((Math.random() - 0.5) * 6).toFixed(2));
        const color = NOTE_COLORS[state.colorIndex % NOTE_COLORS.length];
        const z_index = state.zOrder.length + 1;
        state.colorIndex += 1;

        try {
          const apiUrl = new URL("/api/add", window.location.origin).toString();
          const res = await fetch(apiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ x, y, color, z_index, rotation }),
          });

          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json();

          // 서버에서 받은 id로 노트 추가
          const newNote = {
            id: String(data.id),
            x: data.x,
            y: data.y,
            content: data.content ?? "",
            color: data.color,
            rotation: Number(data.rotation),
          };

          state.notes.push(newNote);
          state.zOrder.push(newNote.id);
          render();
        } catch (e) {
          console.error("노트 추가 실패:", e);
          alert("노트 추가에 실패했습니다.");
        }
      }

      function createNoteEl(note) {
        const noteEl = document.createElement("div");
        noteEl.className = "postit-note";
        noteEl.dataset.noteId = note.id;

        const header = document.createElement("div");
        header.className = "postit-noteHeader";

        const lines = document.createElement("div");
        lines.className = "postit-noteLines";
        lines.setAttribute("aria-hidden", "true");
        lines.innerHTML = "<span></span><span></span><span></span>";

        const del = document.createElement("button");
        del.className = "postit-deleteBtn";
        del.type = "button";
        del.title = "삭제";
        del.textContent = "✕";
        del.addEventListener("click", async (e) => {
          e.stopPropagation();
          await deleteNote(note.id);
        });

        header.appendChild(lines);
        header.appendChild(del);

        const ta = document.createElement("textarea");
        ta.className = "postit-textarea";
        ta.placeholder = "메모를 입력하세요...";
        ta.spellcheck = false;
        ta.value = note.content;
        ta.addEventListener("input", () => {
          const n = state.notes.find((x) => x.id === note.id);
          if (n) n.content = ta.value;
        });
        ta.addEventListener("blur", async () => {
          await updateNote(note.id);
        });

        noteEl.appendChild(header);
        noteEl.appendChild(ta);

        noteEl.addEventListener("mousedown", (e) => {
          const target = e.target;
          if (target && target.tagName === "TEXTAREA") return;
          if (target && target.closest && target.closest(".postit-deleteBtn"))
            return;

          e.preventDefault();
          bringToFront(note.id);
          state.drag = {
            id: note.id,
            offsetX: e.clientX - note.x,
            offsetY: e.clientY - note.y,
          };
          noteEl.classList.add("isDragging");
          render();
        });

        return noteEl;
      }

      function applyNoteStyle(noteEl, note) {
        const zIndex = state.zOrder.indexOf(note.id) + 1;
        noteEl.style.left = `${note.x}px`;
        noteEl.style.top = `${note.y}px`;
        noteEl.style.backgroundColor = note.color;
        noteEl.style.transform = `rotate(${note.rotation}deg)`;
        noteEl.style.zIndex = String(zIndex);
      }

      function render() {
        els.info.textContent = `메모 ${state.notes.length}개`;
        els.empty.hidden = state.notes.length !== 0;

        els.board.querySelectorAll(".postit-note").forEach((el) => el.remove());

        for (const id of state.zOrder) {
          const note = state.notes.find((n) => n.id === id);
          if (!note) continue;
          const el = createNoteEl(note);
          applyNoteStyle(el, note);
          if (state.drag && state.drag.id === note.id)
            el.classList.add("isDragging");
          els.board.appendChild(el);
        }
      }

      window.addEventListener("mousemove", (e) => {
        if (!state.drag) return;
        const id = state.drag.id;
        const note = state.notes.find((n) => n.id === id);
        if (!note) return;

        const rect = els.board.getBoundingClientRect();
        const maxX = rect.width - 40;
        const maxY = rect.height - 40;
        note.x = clamp(e.clientX - rect.left - state.drag.offsetX, -20, maxX);
        note.y = clamp(e.clientY - rect.top - state.drag.offsetY, -20, maxY);

        const el = els.board.querySelector(
          `.postit-note[data-note-id="${id}"]`,
        );
        if (el) applyNoteStyle(el, note);
      });

      window.addEventListener("mouseup", () => {
        if (!state.drag) return;
        const id = state.drag.id;
        state.drag = null;
        const el = els.board.querySelector(
          `.postit-note[data-note-id="${id}"]`,
        );
        if (el) el.classList.remove("isDragging");
        updateNote(id);
      });

      els.addBtn.addEventListener("click", addNote);

      async function loadNotes() {
        try {
          const apiUrl = new URL(
            "/api/list",
            window.location.origin,
          ).toString();
          const res = await fetch(apiUrl, {
            method: "GET",
            headers: { Accept: "application/json" },
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json();
          const notes = (Array.isArray(data) ? data : []).map((n) => ({
            id: String(n.id),
            x: Number(n.x ?? 0),
            y: Number(n.y ?? 0),
            content: String(n.content ?? ""),
            color: String(n.color ?? NOTE_COLORS[0]),
            rotation: Number(n.rotation ?? 0),
            z_index: Number(n.z_index ?? 0),
          }));

          notes.sort((a, b) => (a.z_index ?? 0) - (b.z_index ?? 0));
          state.notes = notes.map(({ z_index, ...rest }) => rest);
          state.zOrder = notes.map((n) => n.id);
        } catch (e) {
          console.error("노트 로딩 실패:", e);
          state.notes = [];
          state.zOrder = [];
        } finally {
          render();
        }
      }

      loadNotes();
    </script>
  </body>
</html>
