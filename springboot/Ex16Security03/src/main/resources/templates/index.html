<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>메인화면</title>
</head>
<body>

<h3>메인화면</h3>

로그인여부(isAuthenticated()) : <br>
isAuthenticated()함수가 true이면 span text가 표시된다. false면 사라짐.<br>
<span sec:authorize="isAuthenticated()" style="color:red">인증 후 - 로그인상태</span>  <br>

<hr>

로그인여부(isAnonymous()) : <br>
isAnonymous()함수가 true이면 span text가 표시된다. false면 사라짐.<br>
<span sec:authorize="isAnonymous()" style="color:red">인증 전 - 로그아웃상태</span> <br>
<hr>

<th:block sec:authorize="isAuthenticated()">
    <form action="logoutAction" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">로그아웃</button>
    </form>
</th:block>

<th:block sec:authorize="isAnonymous()">
    <a th:href="@{/loginForm}">로그인</a>
</th:block>

<hr>

권한/역할/인가(hasRole('USER')) : <br>
<span sec:authorize="hasRole('USER')">일반회원입니다.</span>

<hr>

권한/역할/인가(hasRole('ADMIN')) : <br>
<th:block sec:authorize="hasRole('ADMIN')">
    <span>관리자입니다.</span>
    <a th:href="@{/admin}">관리자 페이지로 이동(회원목록)</a>
</th:block>

<hr>

</body>
</html>
